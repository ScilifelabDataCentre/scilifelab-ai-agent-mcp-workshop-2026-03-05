<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="agentFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f5e9"/>
      <stop offset="100%" stop-color="#c8e6c9"/>
    </linearGradient>
    <linearGradient id="mcpFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e3f2fd"/>
      <stop offset="100%" stop-color="#bbdefb"/>
    </linearGradient>
    <linearGradient id="serveFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4f7e4"/>
      <stop offset="100%" stop-color="#e8edcc"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.1"/>
    </filter>
    <filter id="shadowSmall">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#000" flood-opacity="0.07"/>
    </filter>
  </defs>

  <rect width="1200" height="480" fill="#ffffff"/>
  <rect x="0" y="0" width="1200" height="3" fill="#a2b829"/>

  <text x="600" y="32" text-anchor="middle" fill="#555555" font-size="13" letter-spacing="3" font-weight="600">FROM WORKSHOP TO REAL WORLD</text>
  <line x1="430" y1="40" x2="770" y2="40" stroke="#a2b829" stroke-width="2" opacity="0.6"/>

  <!-- ═══════ BOX 1: LangGraph Agent ═══════ -->
  <rect x="30" y="55" width="310" height="365" rx="12" fill="url(#agentFill)" stroke="#4caf50" stroke-width="2" filter="url(#shadow)"/>
  <rect x="30" y="55" width="310" height="50" rx="12" fill="#4caf50"/>
  <rect x="30" y="85" width="310" height="20" fill="#4caf50"/>
  <text x="185" y="77" text-anchor="middle" fill="#ffffff" font-size="14">🧠</text>
  <text x="185" y="97" text-anchor="middle" fill="#ffffff" font-size="17" font-weight="700">LangGraph Agent</text>
  <text x="185" y="122" text-anchor="middle" fill="#2e7d32" font-size="11" font-style="italic">Host: reasoning &amp; planning</text>

  <rect x="52" y="136" width="266" height="36" rx="7" fill="#ffffff" stroke="#81c784" stroke-width="1.2" filter="url(#shadowSmall)"/>
  <text x="70" y="159" fill="#2e7d32" font-size="13" font-weight="700">①</text>
  <text x="88" y="159" fill="#1b5e20" font-size="13" font-weight="600">User query</text>
  <text x="286" y="159" text-anchor="end" fill="#666666" font-size="10">natural language</text>

  <line x1="185" y1="172" x2="185" y2="184" stroke="#81c784" stroke-width="1.5"/>
  <polygon points="182,182 185,188 188,182" fill="#81c784"/>

  <rect x="52" y="190" width="266" height="36" rx="7" fill="#ffffff" stroke="#81c784" stroke-width="1.2" filter="url(#shadowSmall)"/>
  <text x="70" y="213" fill="#2e7d32" font-size="13" font-weight="700">②</text>
  <text x="88" y="213" fill="#1b5e20" font-size="13" font-weight="600">Mediator</text>
  <text x="286" y="213" text-anchor="end" fill="#666666" font-size="10">route to MCP tool</text>

  <line x1="185" y1="226" x2="185" y2="238" stroke="#81c784" stroke-width="1.5"/>
  <polygon points="182,236 185,242 188,236" fill="#81c784"/>

  <rect x="52" y="244" width="266" height="36" rx="7" fill="#ffffff" stroke="#81c784" stroke-width="1.2" filter="url(#shadowSmall)"/>
  <text x="70" y="267" fill="#2e7d32" font-size="13" font-weight="700">③</text>
  <text x="88" y="267" fill="#1b5e20" font-size="13" font-weight="600">Tool call</text>
  <text x="286" y="267" text-anchor="end" fill="#666666" font-size="10">via MCP protocol</text>

  <line x1="185" y1="280" x2="185" y2="292" stroke="#81c784" stroke-width="1.5"/>
  <polygon points="182,290 185,296 188,290" fill="#81c784"/>

  <rect x="52" y="298" width="266" height="36" rx="7" fill="#ffffff" stroke="#81c784" stroke-width="1.2" filter="url(#shadowSmall)"/>
  <text x="70" y="321" fill="#2e7d32" font-size="13" font-weight="700">④</text>
  <text x="88" y="321" fill="#1b5e20" font-size="13" font-weight="600">Diagnosis</text>
  <text x="286" y="321" text-anchor="end" fill="#666666" font-size="10">grounded output</text>

  <rect x="52" y="346" width="266" height="24" rx="5" fill="#4caf5015"/>
  <text x="185" y="363" text-anchor="middle" fill="#2e7d32" font-size="10" font-weight="600">Same pattern from Session 1 + Part 6</text>

  <!-- ═══════ BOX 2: MCP Server ═══════ -->
  <rect x="440" y="55" width="310" height="365" rx="12" fill="url(#mcpFill)" stroke="#1976d2" stroke-width="2" filter="url(#shadow)"/>
  <rect x="440" y="55" width="310" height="50" rx="12" fill="#1976d2"/>
  <rect x="440" y="85" width="310" height="20" fill="#1976d2"/>
  <text x="595" y="77" text-anchor="middle" fill="#ffffff" font-size="14">🔌</text>
  <text x="595" y="97" text-anchor="middle" fill="#ffffff" font-size="17" font-weight="700">MCP Server</text>
  <text x="595" y="122" text-anchor="middle" fill="#1565c0" font-size="11" font-style="italic">Flask: validate, parse, guardrails</text>

  <rect x="462" y="136" width="266" height="36" rx="7" fill="#ffffff" stroke="#64b5f6" stroke-width="1.2" filter="url(#shadowSmall)"/>
  <text x="480" y="153" fill="#1565c0" font-size="12" font-weight="700">tools/list</text>
  <text x="480" y="166" fill="#666666" font-size="10">→ analyze_xray schema</text>

  <rect x="462" y="180" width="266" height="36" rx="7" fill="#ffffff" stroke="#64b5f6" stroke-width="1.2" filter="url(#shadowSmall)"/>
  <text x="480" y="197" fill="#1565c0" font-size="12" font-weight="700">tools/call</text>
  <text x="480" y="210" fill="#666666" font-size="10">→ validate input + forward to Gradio</text>

  <rect x="462" y="224" width="266" height="60" rx="7" fill="#ffffff" stroke="#64b5f6" stroke-width="1.2" filter="url(#shadowSmall)"/>
  <text x="595" y="242" text-anchor="middle" fill="#1565c0" font-size="12" font-weight="700">Guardrails</text>
  <text x="595" y="258" text-anchor="middle" fill="#555555" font-size="10">✓ Image validation    ✓ Rate limiting</text>
  <text x="595" y="274" text-anchor="middle" fill="#555555" font-size="10">✓ Format check         ✓ Timeout (120s)</text>

  <rect x="462" y="292" width="266" height="36" rx="7" fill="#ffffff" stroke="#64b5f6" stroke-width="1.2" filter="url(#shadowSmall)"/>
  <text x="480" y="309" fill="#1565c0" font-size="12" font-weight="700">Response</text>
  <text x="480" y="322" fill="#666666" font-size="10">→ probabilities + heatmap paths</text>

  <rect x="462" y="346" width="266" height="24" rx="5" fill="#1976d215"/>
  <text x="595" y="363" text-anchor="middle" fill="#1565c0" font-size="10" font-weight="600">Same pattern from Parts 3 + 5</text>

  <!-- ═══════ BOX 3: SciLifeLab Serve ═══════ -->
  <rect x="850" y="55" width="320" height="365" rx="12" fill="url(#serveFill)" stroke="#a2b829" stroke-width="2" filter="url(#shadow)"/>
  <rect x="850" y="55" width="320" height="50" rx="12" fill="#a2b829"/>
  <rect x="850" y="85" width="320" height="20" fill="#a2b829"/>
  <text x="1010" y="77" text-anchor="middle" fill="#ffffff" font-size="14">☁️</text>
  <text x="1010" y="97" text-anchor="middle" fill="#ffffff" font-size="17" font-weight="700">SciLifeLab Serve</text>
  <text x="1010" y="122" text-anchor="middle" fill="#6b7a1a" font-size="11" font-style="italic">Any deployed public app</text>

  <rect x="872" y="136" width="276" height="90" rx="8" fill="#ffffff" stroke="#a2b829" stroke-width="1.5" filter="url(#shadowSmall)"/>
  <rect x="872" y="136" width="276" height="26" rx="8" fill="#8a9e22"/>
  <rect x="872" y="150" width="276" height="12" fill="#8a9e22"/>
  <text x="1010" y="155" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">SHAMSUL</text>
  <text x="1010" y="178" text-anchor="middle" fill="#4a5a10" font-size="10" font-weight="600">Chest X-ray pathology  + Interpretability analysis</text>
  <text x="1010" y="194" text-anchor="middle" fill="#555555" font-size="10">Chest X-ray → prediction probabilities + heatmaps</text>
  <text x="1010" y="210" text-anchor="middle" fill="#888888" font-size="9">(Grad-CAM · LIME · SHAP · LRP)</text>

  <rect x="872" y="236" width="276" height="30" rx="7" fill="#ffffff" stroke="#c5d462" stroke-width="1.2" stroke-dasharray="6,3"/>
  <text x="1010" y="256" text-anchor="middle" fill="#5a6b12" font-size="11">🧬  Protein structure prediction</text>

  <rect x="872" y="274" width="276" height="30" rx="7" fill="#ffffff" stroke="#c5d462" stroke-width="1.2" stroke-dasharray="6,3"/>
  <text x="1010" y="294" text-anchor="middle" fill="#5a6b12" font-size="11">🧪  Chemical structure recognition</text>

  <rect x="872" y="312" width="276" height="30" rx="7" fill="#ffffff" stroke="#c5d462" stroke-width="1.2" stroke-dasharray="6,3"/>
  <text x="1010" y="332" text-anchor="middle" fill="#5a6b12" font-size="11">🔬  Any public app with exposed APIs</text>

  <rect x="872" y="352" width="276" height="24" rx="5" fill="#a2b82915"/>
  <text x="1010" y="369" text-anchor="middle" fill="#5a6b12" font-size="10" font-weight="600">Free for Swedish research institutions</text>

  <!-- ═══════ ARROWS ═══════ -->
  <line x1="340" y1="230" x2="432" y2="230" stroke="#4caf50" stroke-width="3"/>
  <polygon points="430,223 442,230 430,237" fill="#1976d2"/>
  <rect x="358" y="208" width="68" height="18" rx="4" fill="#ffffff" stroke="#aaaaaa" stroke-width="0.8"/>
  <text x="392" y="221" text-anchor="middle" fill="#333333" font-size="10" font-weight="700">JSON-RPC</text>

  <line x1="440" y1="255" x2="345" y2="255" stroke="#888888" stroke-width="1.5" stroke-dasharray="6,4"/>
  <polygon points="348,250 336,255 348,260" fill="#888888"/>

  <line x1="750" y1="230" x2="842" y2="230" stroke="#1976d2" stroke-width="3"/>
  <polygon points="840,223 852,230 840,237" fill="#a2b829"/>
  <rect x="773" y="208" width="52" height="18" rx="4" fill="#ffffff" stroke="#aaaaaa" stroke-width="0.8"/>
  <text x="799" y="221" text-anchor="middle" fill="#333333" font-size="10" font-weight="700">HTTPS</text>

  <line x1="850" y1="255" x2="755" y2="255" stroke="#888888" stroke-width="1.5" stroke-dasharray="6,4"/>
  <polygon points="758,250 746,255 758,260" fill="#888888"/>

  <!-- ═══════ Bottom tagline ═══════ -->
  <rect x="0" y="430" width="1200" height="50" fill="#f5f5f5"/>
  <line x1="0" y1="430" x2="1200" y2="430" stroke="#e0e0e0" stroke-width="1"/>
  <text x="600" y="452" text-anchor="middle" fill="#3a4a0c" font-size="14" font-weight="700">Same MCP pattern you built today — works with any app on SciLifeLab Serve</text>
  <text x="600" y="470" text-anchor="middle" fill="#666666" font-size="11">serve.scilifelab.se/apps  ·  3-bonus-mcp-serve-app-integration/ in the workshop repo</text>
</svg>